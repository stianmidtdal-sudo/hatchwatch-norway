<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hatch Watch Norway · Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎣</text></svg>">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f7f4;
            color: #1a3a2a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .box {
            background: white;
            border-radius: 16px;
            padding: 40px 36px;
            box-shadow: 0 4px 24px rgba(27,67,50,0.12);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .logo { font-size: 2.2rem; margin-bottom: 10px; }
        h1 { font-size: 1.25rem; font-weight: 700; color: #1B4332; }
        .sub { font-size: 0.8rem; color: #74C69D; margin-top: 4px; margin-bottom: 28px; }
        input[type="password"] {
            width: 100%;
            padding: 11px 16px;
            border: 2px solid #c8e6d8;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.15s;
            text-align: center;
            letter-spacing: 0.1em;
        }
        input[type="password"]:focus { border-color: #2D6A4F; }
        button {
            width: 100%;
            margin-top: 14px;
            padding: 12px;
            background: #1B4332;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #2D6A4F; }
        .error {
            margin-top: 14px;
            font-size: 0.85rem;
            color: #c0392b;
            display: none;
        }
        .error.visible { display: block; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">🎣</div>
    <h1>Hatch Watch Norway</h1>
    <div class="sub">Aquatic insect emergence forecasting</div>
    <form method="POST" action="/api/login" id="form">
        <input type="password" name="pw" placeholder="Password" autocomplete="current-password" autofocus>
        <button type="submit">Enter</button>
    </form>
    <div class="error" id="err">Wrong password — try again.</div>
</div>
<script>
    if (new URLSearchParams(location.search).get('err')) {
        document.getElementById('err').classList.add('visible');
    }
</script>
</body>
</html>
